services:
  postgres:
    image: postgres:16-alpine
    container_name: corebank-postgres
    environment:
      POSTGRES_DB: corebank
      POSTGRES_USER: corebank
      POSTGRES_PASSWORD: corebank123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corebank -d corebank"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - corebank-network

  redis:
    image: redis:7-alpine
    container_name: corebank-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - corebank-network

networks:
  corebank-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: